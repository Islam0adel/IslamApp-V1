name: Sync Full Project to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # 1. عمل Clone للـ Space
          git clone https://Islamadel:$HF_TOKEN@huggingface.co/spaces/Islamadel/islam-app-api hf-space

          # 2. مسح محتوى الـ space القديم (ما عدا فولدر .git)
          find hf-space -maxdepth 1 ! -name '.git' ! -name 'hf-space' -exec rm -rf {} +

          # 3. نسخة rsync في سطر واحد عشان نتجنب خطأ command not found
          # ضفت لك كمان استبعاد لكل صور الأيقونات عشان نضمن إن مفيش حاجة ترفض الرفع
          rsync -av --progress ./ ./hf-space --exclude hf-space --exclude .git --exclude .github --exclude "frontend/assets/images/*.png" --exclude "frontend/web/icons/*.png" --exclude "frontend\web\icons\Icon-maskable-512.png"

          cd hf-space

          # 4. الرفع لهيوجينج
          git add .
          git commit -m "Auto sync: stripping binary files" || echo "No changes"
          git push -f origin main