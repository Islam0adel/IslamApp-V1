name: islam_app
description: "IslamApp V 1.0 - Advanced Financial System"
version: 1.0.0+1
publish_to: 'none'

# تحديد إصدار الـ SDK لضمان استقرار الأداء
environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # مكتبة الـ HTTP للربط مع الـ FastAPI
  http: ^1.1.0

  # مكتبة حفظ البيانات محلياً (ضرورية لخاصية تذكرني)
  shared_preferences: ^2.2.2

  # المكتبة المسؤولة عن فتح روابط استعادة كلمة المرور
  url_launcher: ^6.2.1

  # المكتبة الأساسية للتعامل مع الوقت والتاريخ والعملات
  intl: ^0.19.0

  # مكتبة الرسوم البيانية لتقارير المبيعات
  fl_chart: ^0.66.0

  # أيقونات أبل الجميلة
  cupertino_icons: ^1.0.6

  firebase_auth: ^5.1.1  # أضف هذا السطر
  firebase_core: ^3.1.1  # تأكد من وجوده

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # مكتبة قواعد الكود لضمان نظافة البرمجة
  flutter_lints: ^3.0.0

flutter:
  # تفعيل نظام Material 3 للأشكال العصرية والانحناءات الزجاجية
  uses-material-design: true

  # ---------------------------------------------------------
  # ملاحظة: لو حابب تفعّل خط Cairo، فك التعليق عن الأسطر اللي تحت
  # وتأكد من وجود الملفات في فولدر assets/fonts
  # ---------------------------------------------------------
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700