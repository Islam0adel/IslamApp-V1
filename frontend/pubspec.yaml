name: islam_app
description: "IslamApp V 1.0 - Advanced Financial System"
version: 1.0.0+1

publish_to: 'none'

# تحديد إصدار الـ SDK لضمان استقرار الأداء
environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # المكتبة الأساسية للتعامل مع الوقت والتاريخ والعملات (اللي طلبتها)
  intl: ^0.19.0

  # مكتبة الـ HTTP للربط مع الـ FastAPI
  http: ^1.1.0

  # أيقونات أبل الجميلة
  cupertino_icons: ^1.0.6

  # مكتبة الرسوم البيانية (هنحتاجها في تقارير المبيعات عشان الجمال)
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # مكتبة قواعد الكود
  flutter_lints: ^3.0.0

flutter:
  # تفعيل نظام Material 3 للأشكال العصرية والانحناءات
  uses-material-design: true

  # ---------------------------------------------------------
  # ملاحظة لهندسة إسلام: 
  # لو نزلت خط Cairo، فكه هنا في الفولدر ده عشان يشتغل
  # ---------------------------------------------------------
